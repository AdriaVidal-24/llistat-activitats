<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Web able to plan, manage and follow up on personal tasks">
    <meta name="keywords" content="Activities, llist, objectives, planning, management, tasks">
    <meta name="author" content="Adrià Vidal Ruiz">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Task manager">
    <meta property="og:description" content="Web able to plan, manage and follow up on personal tasks">
    <meta property="og:url" content="https://adriavidal-24.github.io/llistat-activitats/">
    <meta property="og:type" content="website">
    
    <title>Task manager</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/i/favicon.ico">
</head>
<body>
    <main>
        <aside class="accent">
            <section>
                <h2>Menu</h2>
                <nav class="flex column">
                    <a href="index.html">Projects</a>
                        <ul>
                            <li>Project A</li>
                            <li>Project B</li>
                            <li>Project C</li>
                        </ul>
                        <a href="crear-tasca.html">Create task</a>
                        <a href="categories.html">Category</a>
                    </nav>
            </section>
            <button>Dark mode</button>
        </aside>
    
        <div class="small">
            <h1>Task creator</h1>
            <section>
                <form id="task" class="flex column a-center" action="#">
                    <label for="task-name">Task name:</label>
                    <input type="text" id="task-name" name="task-name" placeholder="Task name" required minlength="3" maxlength="35">
                    <label for="task-description">Task description:</label>
                    <input type="text" id="task-description" name="task-description" placeholder="Task Description" minlength="5" maxlength="75">
                    <label for="task-date">Due date:</label>
                    <input type="date" id="task-date" name="task-date" placeholder="dd/mm/aaaa">
                    <label for="task-category">Task category:</label>
                    <select id="task-category" name="task-category"></select>

                    <label for="task-priority">Priority:</label>
                    <select id="task-priority" name="task-priority" required>
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                    </select>
                    <button id="task-submit" type="submit">Create task</button>
                </form>
            </section>
        </div>
    </main>
</body>
    <script type="module" src="js/form-tasca.js"></script> 
</html>
