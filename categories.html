<body>
    <main>
        <aside class="accent">
            <section>
                <h2>Menu</h2>
                <nav class="flex column">
                    <p>Projects</p>
                        <ul>
                            <li>Project A</li>
                            <li>Project B</li>
                            <li>Project C</li>
                        </ul>
                        <a href="crear-tasca.html">Create task</a>
                        <a href="categories.html">Category</a>
                    </nav>
            </section>
            <button>Dark mode</button>
        </aside>
    
        <div class="categories small">
            <h1>Category management</h1>

            <section class="flex column a-center">
                <form id="category" class="flex column a-center j-between">
                    <label for="cat-name">Category name:</label>
                    <input id="cat-name" name="cat-name" type="text" required>

                    <div class="flex j-start a-center">
                        <label for="cat-color">Category color:</label>
                        <input id="cat-color" name="cat-color" type="color">
                    </div>

                    <button type="submit">Add category</button>
                </form>
            </section>

            <section>
                <div class="flex row a-center j-between category">
                    <div class="flex a-center">
                        <div></div>
                        <p>Category 1</p>
                    </div>
                    <button>Delete</button>
                </div>
            </section>
        </div>
    </main>
</body>
